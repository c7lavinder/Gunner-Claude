# railway.toml
# Gunner AI — Railway deployment configuration

[build]
builder = "nixpacks"
buildCommand = "npm run db:migrate:prod && npm run build"

[deploy]
startCommand = "npm start"
healthcheckPath = "/api/health"
healthcheckTimeout = 30
restartPolicyType = "on_failure"
restartPolicyMaxRetries = 3

[[services]]
name = "gunner-ai-web"

[services.env]
PORT = "3000"
NODE_ENV = "production"

# Cron job: poll GHL for new calls every minute (CallCompleted webhook unavailable)
[[cron]]
name = "poll-calls"
schedule = "* * * * *"
command = "npx tsx scripts/poll-calls.ts"

# Cron job: process recording fetch jobs every minute (durable queue — replaces setTimeout)
[[cron]]
name = "process-recording-jobs"
schedule = "* * * * *"
command = "npx tsx scripts/process-recording-jobs.ts"

# Cron job: daily self-audit at 2am UTC
[[cron]]
name = "daily-audit"
schedule = "0 2 * * *"
command = "npx tsx scripts/audit.ts"

# Cron job: daily KPI snapshot at midnight UTC
[[cron]]
name = "daily-kpi-snapshot"
schedule = "0 0 * * *"
command = "npx tsx scripts/kpi-snapshot.ts"

# Cron job: weekly user profile generation (Sunday 3am UTC)
[[cron]]
name = "weekly-profiles"
schedule = "0 3 * * 0"
command = "npx tsx scripts/generate-profiles.ts"
