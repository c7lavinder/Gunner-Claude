# railway.toml
# Gunner AI — Railway deployment configuration

[build]
builder = "nixpacks"
buildCommand = "npm run db:migrate:prod && npm run build"

[deploy]
startCommand = "npm start"
healthcheckPath = "/api/health"
healthcheckTimeout = 30
restartPolicyType = "on_failure"
restartPolicyMaxRetries = 3

[[services]]
name = "gunner-ai-web"

[services.env]
PORT = "3000"
NODE_ENV = "production"

# Cron job: poll GHL for new calls every minute (CallCompleted webhook unavailable)
[[cron]]
name = "poll-calls"
schedule = "* * * * *"
command = "npx tsx scripts/poll-calls.ts"

# process-recording-jobs was previously a [[cron]] here. Removed 2026-04-20
# because Railway's cron scheduler stopped firing it reliably and redeploys
# did not re-register it. Replaced by the grading-worker [[services]] block
# below, which runs the same processJobs() in an infinite 60s loop.

# Cron job: daily self-audit at 2am UTC
[[cron]]
name = "daily-audit"
schedule = "0 2 * * *"
command = "npx tsx scripts/audit.ts"

# Cron job: daily KPI snapshot at midnight UTC
[[cron]]
name = "daily-kpi-snapshot"
schedule = "0 0 * * *"
command = "npx tsx scripts/kpi-snapshot.ts"

# Cron job: weekly user profile generation (Sunday 3am UTC)
[[cron]]
name = "weekly-profiles"
schedule = "0 3 * * 0"
command = "npx tsx scripts/generate-profiles.ts"

# Cron job: regenerate Property Stories for properties with activity since
# last generation. Runs daily at 7am UTC. Call-graded events trigger story
# regen in real time; this cron catches properties touched by edits, milestone
# changes, buyer activity, or blasts that don't go through the grading path.
[[cron]]
name = "regenerate-stories"
schedule = "0 7 * * *"
command = "npx tsx scripts/regenerate-stories.ts"

# Long-running service: grading worker. Replaces the broken
# process-recording-jobs [[cron]]. Runs processJobs() forever with a 60s
# sleep between iterations. Railway keeps the process alive and SIGTERMs
# it on redeploy for a clean restart.
[[services]]
name = "grading-worker"

[services.deploy]
startCommand = "npx tsx scripts/grading-worker.ts"
