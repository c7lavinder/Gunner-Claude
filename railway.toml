# railway.toml
# Gunner AI — Railway deployment configuration

[build]
builder = "nixpacks"
buildCommand = "npm run db:migrate:prod && npm run build"

[deploy]
startCommand = "npm start"
healthcheckPath = "/api/health"
healthcheckTimeout = 30
restartPolicyType = "on_failure"
restartPolicyMaxRetries = 3

[[services]]
name = "gunner-ai-web"

[services.env]
PORT = "3000"
NODE_ENV = "production"
# Force npm to install devDependencies even under NODE_ENV=production.
# Next.js build requires autoprefixer/postcss/tailwind at build time even
# though they're not runtime deps. Without this, a Nixpacks/npm version
# update can silently prune them and the build fails with
# "Cannot find module 'autoprefixer'".
NPM_CONFIG_PRODUCTION = "false"

# Cron job: poll GHL for new calls every minute (CallCompleted webhook unavailable)
[[cron]]
name = "poll-calls"
schedule = "* * * * *"
command = "npx tsx scripts/poll-calls.ts"

# process-recording-jobs was previously a [[cron]] here. Removed 2026-04-20
# because Railway's cron scheduler stopped firing it reliably and redeploys
# did not re-register it. Briefly replaced by a [[services]] grading-worker
# (Sessions 38-44), then superseded by the in-process worker via
# instrumentation.ts (Sessions 41-42 build, Wave 1 cleanup 2026-04-27).

# Cron job: daily self-audit at 2am UTC
[[cron]]
name = "daily-audit"
schedule = "0 2 * * *"
command = "npx tsx scripts/audit.ts"

# Cron job: daily KPI snapshot at midnight UTC
[[cron]]
name = "daily-kpi-snapshot"
schedule = "0 0 * * *"
command = "npx tsx scripts/kpi-snapshot.ts"

# Cron job: weekly user profile generation (Sunday 3am UTC)
[[cron]]
name = "weekly-profiles"
schedule = "0 3 * * 0"
command = "npx tsx scripts/generate-profiles.ts"

# Cron job: regenerate Property Stories for properties with activity since
# last generation. Runs daily at 7am UTC. Call-graded events trigger story
# regen in real time; this cron catches properties touched by edits, milestone
# changes, buyer activity, or blasts that don't go through the grading path.
[[cron]]
name = "regenerate-stories"
schedule = "0 7 * * *"
command = "npx tsx scripts/regenerate-stories.ts"

# Cron job: enrichment catch-up for Phase 2 backfill stub rows.
# Walks Property where pendingEnrichment=true (~8000 stubs after the 2026-05-06
# Phase 2 backfill), fetches the real GHL contact, fills in address + Seller
# fields, then fires multi-vendor enrichment (PropertyRadar subscription =
# free per call; BatchData internal $15/day cap; Google ~$0.017/call).
# 100 rows per run × every 5 min = ~6.7 hours to drain a full backfill.
[[cron]]
name = "enrich-pending"
schedule = "*/5 * * * *"
command = "npx tsx scripts/enrich-pending.ts"

# Cron job: nightly aggregate computation across Sellers + Buyers.
# Seller portfolio (deals owned / closed / walked, close rate, last close),
# call voice aggregates (trust arc, primary emotion, energy trend,
# competitors + dealkillers), plus Buyer conversion funnel. Runs at 4am UTC
# so it's after KPI snapshot (midnight) but before the property-story cron.
[[cron]]
name = "compute-aggregates"
schedule = "0 4 * * *"
command = "npx tsx scripts/compute-aggregates.ts"

# Grading worker now runs in-process via instrumentation.ts (Sessions 41-42)
# inside the gunner-ai-web service — no separate [[services]] block needed.
# The previous standalone [[services]] grading-worker block was removed
# 2026-04-27 (Wave 1 of v1-finish sprint, Blocker #3 closed). Manual debug
# trigger remains available via app/api/cron/process-recording-jobs/route.ts.
