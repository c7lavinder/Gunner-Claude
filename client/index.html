<!doctype html>
<html lang="en">

  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1" />
    <title>Gunner</title>
    <link rel="icon" type="image/png" href="https://d2xsxph8kpxj0f.cloudfront.net/310519663328210645/nusXfQu5XBTMz3NUCR6brb/branding/gunner-logo.png" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=Orbitron:wght@400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
    <link href="https://api.fontshare.com/v2/css?f[]=satoshi@300,400,500,600,700,800,900&display=swap" rel="stylesheet" />
  </head>

  <body>
    <div id="root"></div>
    <script>
      window.onerror=function(m,s,l,c,e){document.getElementById('root').innerHTML='<pre style="color:red;padding:20px;font-size:14px">JS ERROR:\n'+m+'\n'+s+':'+l+':'+c+'\n'+(e&&e.stack||'')+'</pre>';};
      window.addEventListener('unhandledrejection',function(e){document.getElementById('root').innerHTML='<pre style="color:red;padding:20px;font-size:14px">UNHANDLED REJECTION:\n'+(e.reason&&e.reason.stack||e.reason)+'</pre>';});
    </script>
    <script type="module" src="/src/main.tsx"></script>
  </body>

</html>
